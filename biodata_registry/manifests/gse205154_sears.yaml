# Sears lab (OHSU) — GSE205154 (bulk RNA-seq subseries of SuperSeries GSE281129)
# PDAC primary + metastatic FFPE bulk RNA-seq
#
# Reference: PMID 39789181
#   "Ongoing replication stress tolerance and clonal T cell responses
#    distinguish liver and lung recurrence and outcomes in pancreatic cancer"
#   Contact: Rosalie Sears lab, Oregon Health & Science University.
#
# SCOPE NOTE:
#   The user-supplied accession GSE281129 is a SuperSeries that bundles two
#   modalities: bulk RNA-seq (GSE205154, this manifest) and TCRbeta-seq
#   (GSE281005). Only the bulk RNA-seq expression subseries is in scope for
#   this registry. TCR repertoire data is NOT covered here.
#
# DESIGN PRINCIPLE:
#   This manifest defines column semantics and safe interpretation rules.
#   It does not encode observed counts, sample membership, or biological
#   conclusions that can be computed from the data.
#
# SIBLING VARIANTS (same 289-sample cohort, different quantification):
#   gse205154_sears        — TPM        (this file; Path B, limma/ttest)
#   gse205154_sears_counts — est. counts (Path A, DESeq2 on rounded int32)
#   gse205154_sears_tmm    — edgeR TMM  (Path B, limma/ttest on normalized)
#   Pick ONE per analysis; never pool across variants (identical samples).
#
# VALIDATION STATUS:
#   Sample-level metadata (tumor type, tissue) confirmed from the GSE205154
#   series matrix header (289 samples). Expression matrix inspected directly
#   (GSE205154_Gene_Level_TPM_Estimates.txt.gz): 289 sample columns keyed by
#   ST-<id>-T/-M/-F names, gene rows keyed by versioned Ensembl IDs with
#   ensembl_gene_id / hgnc_symbol / gene_biotype / gene_name annotation columns.

dataset_id: gse205154_sears

title: "Sears Lab PDAC Bulk RNA-seq — Primary + Metastatic FFPE (GSE205154; SuperSeries GSE281129)"

accession: GSE205154
# Bulk RNA-seq subseries of SuperSeries GSE281129. The expression matrix this
# manifest loads is GSE205154's gene-level TPM supplementary file. Cite
# GSE281129 as the parent SuperSeries (PMID 39789181).

organism: human

modality: bulk_rnaseq

platform: "Illumina HiSeq 4000 (kallisto v0.44.0 pseudoalignment, GRCh38.p5 / GENCODE v24, tximport gene-level)"

data_level: tpm
# Gene-level TPM abundances from tximport over kallisto pseudoalignment.
# PATH B: use limma or ttest on log-transformed TPM. Do NOT apply DESeq2 —
# TPM is not integer counts. Do NOT re-run a counts-style normalisation.

feature_id_type: ensembl_gene_id
# Confirmed from the TPM matrix: rows are keyed by versioned Ensembl gene IDs
# (e.g. ENSG00000000003.14). Annotation columns ensembl_gene_id (unversioned),
# hgnc_symbol, gene_biotype, gene_name accompany each row. At assembly, put the
# Ensembl ID in var.index and expose HGNC symbols as var['SYMBOL'] (from
# hgnc_symbol) — mirrors paca_ca_rnaseq. No probe collapse required.

dataset_disclaimer: >
  Sears lab (OHSU) PDAC cohort: 289 FFPE tumor samples (218 primary, 71
  metastatic) profiled by bulk RNA-seq. The liver-vs-lung metastatic-tropism
  grouping that defines this study's gene signature is NOT present in the GEO
  sample metadata — it was derived from clinical chart review and is not
  deposited with the expression matrix. Do not infer liver/lung recurrence
  class from the GEO `tissue` or `tumor type` fields. FFPE-derived RNA;
  interpret low-expression genes with caution.

description: >
  Bulk RNA-seq of 289 primary and metastatic pancreatic ductal adenocarcinoma
  (PDAC) tumors from FFPE blocks, generated by the Sears lab at OHSU
  (GSE205154, bulk RNA-seq subseries of SuperSeries GSE281129). Tumor-enriched
  regions were scraped after pathologic review; RNA was pseudoaligned with
  kallisto and summarised to gene-level TPM with tximport. The study defined a
  liver-vs-lung metastatic-avidity gene signature linked to replication-stress
  pathways and patient outcome, but those tropism labels and survival endpoints
  are not part of the deposited GEO metadata (raw data: dbGaP phs003597).

preprocessing: >
  FFPE tumor RNA pseudoaligned with kallisto v0.44.0 (GRCh38.p5 / GENCODE v24)
  and summarised to gene-level TPM with tximport (289 samples x 60554 genes).
  var.index holds versioned Ensembl gene IDs (e.g. ENSG00000000003.14); HGNC
  symbols are exposed as var['SYMBOL']; no probe collapse. This is the TPM
  variant — log-transform before limma/ttest; do not run DESeq2 (use the counts
  sibling). Liver-vs-lung tropism labels and survival are not in the GEO
  metadata. Path B (limma/ttest).

publication:
  pmid: "39789181"
  authors: "Sears RC, et al. (Brenden-Colson Center for Pancreatic Care, OHSU)"
  year: 2025
  title: >
    Ongoing replication stress tolerance and clonal T cell responses
    distinguish liver and lung recurrence and outcomes in pancreatic cancer
  note: >
    GSE205154 is the bulk RNA-seq subseries of SuperSeries GSE281129.
    Companion subseries GSE281005 holds TCRbeta-seq (out of scope here).
    Raw sequencing deposited in dbGaP phs003597.v1.p1; BioProject PRJNA844022.

expression_source:
  type: url
  url: "https://huggingface.co/datasets/anne-voigt/pdac-research-data/resolve/main/gse205154_sears.h5ad"
  format: h5ad
  note: >
    Pre-assembled h5ad: gene-level TPM matrix (289 samples x 60554 genes,
    float32) from GSE205154_Gene_Level_TPM_Estimates.txt.gz with embedded obs
    metadata. Uploaded to anne-voigt/pdac-research-data 2026-06-22 (URL verified
    HTTP 200). Rebuild via
    DecoupleRpy_Agent/scripts/assemble_gse205154_sears.py (source =
    original_source below).

original_source:
  type: url
  url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE205nnn/GSE205154/suppl/GSE205154_Gene_Level_TPM_Estimates.txt.gz"
  format: gz
  note: >
    GEO supplementary gene-level TPM matrix (tab-delimited). Leading columns:
    ID (versioned Ensembl), ensembl_gene_id, hgnc_symbol, gene_biotype,
    gene_name; followed by 289 sample columns named ST-<id>-T/-M/-F. The 289
    columns match the 289 GEO samples 1:1 by name. Authoritative source for
    building the h5ad above. Companion matrices on GEO:
    GSE205154_Gene_Level_Counts_Estimates.txt.gz (kallisto/tximport estimated
    counts — non-integer) and GSE205154_Gene_Level_TMM_Estimates.txt.gz
    (edgeR TMM, not log-scaled).

metadata_source:
  type: geo_series_matrix
  embedded: true
  note: >
    Sample characteristics are in !Sample_characteristics_ch1 lines of the
    GSE205154 series matrix. Exposed fields: 'tumor type' (Primary/Met),
    'tissue' (anatomical site), 'cell type' (constant: scraped tumor).
    Sample names follow ST-<id>-T (primary) / ST-<id>-M (metastatic).

sample_id_column: null
# GSM accession IDs are stored in the obs DataFrame index, not a column.

# ---------------------------------------------------------------------------
# Metadata column semantic definitions
# ---------------------------------------------------------------------------

metadata_columns:

  tumor_type:
    role: primary_condition
    biological_grouping_allowed: true
    allowed_values:
      - "Primary"
      - "Met"
    missing_values:
      - ""
      - "NA"
      - "nan"
    source_column: "tumor type"
    decoded_column: "tumor_type"
    interpretation_warning: >
      Primary (218) vs metastatic (71) tumors. Metastatic samples span several
      anatomical sites (see `tissue`); they are not a single homogeneous group.
      Compute group sizes from the loaded data before comparing.
    reporting_rules:
      - "Report Primary and Met counts as computed from the loaded data."
      - "State that metastatic samples are pooled across anatomical sites unless tissue-stratified."
    refusal_rules:
      - "Refuse to equate `tumor type: Met` with a specific metastatic site — Met pools liver, lung, peritoneum and others."

  tissue:
    role: sample_origin
    biological_grouping_allowed: true
    allowed_values:
      - "Pancreas"
      - "Liver"
      - "Lung"
      - "Peritoneum"
      - "Duodenum"
      - "Omentum"
      - "Retroperitoneum"
      - "Falciform Ligament"
      - "Mesocolon"
      - "Lymph Node"
      - "Gallbladder"
      - "Jejunum"
      - "Ovary"
      - "Perigastric Nodule"
    missing_values:
      - "NA"
      - ""
      - "nan"
    interpretation_warning: >
      `tissue` is the anatomical site the sample was taken from, NOT a curated
      liver-vs-lung metastatic-tropism class. Most sites are small (Lung n=7,
      Peritoneum n=15, many singletons). Data-hygiene caveats: 'Lymph Node' and
      'LymphNode' appear as separate strings (same site — normalise before
      grouping), and one sample is 'NA'. Compute group sizes from the loaded
      data and exclude groups with fewer than ~3 samples from DE.
    reporting_rules:
      - "Report tissue-site group sizes as computed from the loaded data."
      - "Normalise 'LymphNode' and 'Lymph Node' to one category before counting."
    refusal_rules:
      - "Refuse DE on tissue groups with fewer than 3 samples."
      - "Refuse to treat `tissue` as the study's liver/lung metastatic-avidity signature label."

  cell_type:
    role: technical_metadata
    biological_grouping_allowed: false
    allowed_values:
      - "scraped tumor"
    source_column: "cell type"
    interpretation_warning: >
      Constant across all 289 samples ('scraped tumor'). Carries no variation
      and is not a grouping variable.
    refusal_rules:
      - "Refuse to use cell_type as a grouping variable — it is constant."

# ---------------------------------------------------------------------------
# Dataset-level reporting and refusal rules
# ---------------------------------------------------------------------------

reporting_rules:
  - "Report dataset size as computed from the loaded data."
  - "State that expression values are gene-level TPM (kallisto + tximport, GENCODE v24)."
  - "Do not apply DESeq2 — data_level is tpm, not raw_counts."
  - >
    When asked about liver-vs-lung recurrence or the study's metastatic-avidity
    signature, state plainly that those tropism labels are NOT in the GEO
    metadata (derived from clinical chart review; raw data in dbGaP phs003597)
    and cannot be reconstructed from the deposited `tissue`/`tumor type` fields.
  - "State any subset query used in reported results."

refusal_rules:
  - "Refuse DESeq2 analysis — data_level is tpm, not raw_counts; use limma or ttest on log-TPM."
  - "Refuse survival analysis — survival/outcome endpoints are not provided in this GEO subseries (see dbGaP phs003597)."
  - "Refuse to construct or claim a liver-vs-lung metastatic-tropism grouping from GEO metadata — those labels are not deposited."
  - "Refuse to treat metastatic-site `tissue` values as the published avidity signature classes."

# ---------------------------------------------------------------------------
# Analysis configuration (semantics only — no sample counts)
# ---------------------------------------------------------------------------

group_columns:
  - "tumor_type"
  - "tissue"

feature_mapping:
  requires_collapse: false
  # Ensembl gene IDs in var.index; HGNC symbols in var['SYMBOL'] (from the
  # matrix hgnc_symbol column). Feature-level IDs — no probe collapse needed.

survival_columns:
  event_column: null
  time_column: null
  note: >
    No survival endpoints in this GEO subseries. The publication's outcome
    analyses used clinical data held in dbGaP phs003597, not deposited here.

default_contrasts:
  - design_factor: "tumor_type"
    test_group: "Met"
    control_group: "Primary"
    subset_query: "tumor_type in ['Primary', 'Met']"
    method: limma
    fallback_method: ttest
    note: >
      Primary (218) vs metastatic (71). limma preferred on log-TPM
      (empirical Bayes); ttest fallback when R/limma is unavailable.
      Met pools multiple anatomical sites — interpret accordingly.

valid_workflows:
  - activity_scoring
  - activity_stats

limitations:
  - "GSE205154 is the bulk RNA-seq subseries of SuperSeries GSE281129; the
    companion TCRbeta-seq subseries (GSE281005) is not represented here."
  - "The liver-vs-lung metastatic-tropism / avidity grouping that defines the
    study's gene signature is NOT in the GEO metadata — it came from clinical
    chart review and is not deposited with the expression matrix. Do not infer
    it from `tissue` or `tumor type`."
  - "No survival or clinical-outcome fields are deposited in this subseries
    (raw + clinical data in dbGaP phs003597.v1.p1). Survival workflow disabled."
  - "Expression values are gene-level TPM (kallisto v0.44.0 + tximport, GRCh38.p5
    / GENCODE v24). Do not apply DESeq2; use limma or ttest on log-TPM."
  - "FFPE-derived RNA — expect higher degradation/3' bias than fresh-frozen;
    interpret low-expression genes cautiously."
  - "Metastatic samples (n=71) span several anatomical sites; many sites are
    singletons. Most `tissue` groups are too small for DE on their own."
  - "Feature IDs are versioned Ensembl gene IDs (confirmed from the TPM matrix).
    At assembly, strip or retain the version suffix consistently and expose HGNC
    symbols as var['SYMBOL'] from the hgnc_symbol column for decoupler tools."
  - "7 of the 289 samples carry an -F (fibroblast) name suffix yet are annotated
    `cell type: scraped tumor` and `tumor type: Primary` in GEO. Treat these as
    possibly non-epithelial/fibroblast and exclude or inspect them before
    tumor-specific analyses; do not assume all 289 columns are tumor epithelium."
