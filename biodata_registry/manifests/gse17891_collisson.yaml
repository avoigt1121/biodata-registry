# Collisson et al. 2011 — GSE17891
# PDAC bulk microarray — original QM/exocrine/classical subtype paper
#
# Reference: Collisson EA et al. (2011) Nat Med 17:500-503
#            https://doi.org/10.1038/nm.2344
#
# Platform: Affymetrix Human Genome U133 Plus 2.0 (GPL570)
# 47 human samples: 27 microdissected tumor tissue + 20 PDAC cell lines
# (Mouse samples on GPL8321 excluded.)
# RMA-normalized log2 expression; value range -7.99 – 14.95.
#
# SUBTYPE NOTE: Collisson subtypes (quasi-mesenchymal/QM, exocrine-like, classical)
# are NOT in GEO metadata. They were curated from Collisson 2011 Suppl Table 2
# ("Patient identifiers and subtypes") and encoded as obs['collisson_subtype']
# (27 tumours by AGR id + 19 human cell lines by name; Capan1 unlabeled).
#
# PATH B: data_level=log_expression → limma or ttest.
# Do NOT apply DESeq2 or decoupler_preprocess_data.
#
# VALIDATED: assembled from GEO series matrix June 2026.
# Feature IDs: Affymetrix GPL570 probe IDs; gene symbols in var['gene_symbol'].
# Sample IDs: GSM accession IDs in obs.index.

dataset_id: gse17891_collisson

title: "Collisson et al. 2011 PDAC Bulk Microarray (GSE17891)"

accession: GSE17891

organism: human

modality: bulk_microarray

platform: "Affymetrix Human Genome U133 Plus 2.0 (GPL570)"

data_level: log_expression
# RMA-normalized log2 intensities (Affymetrix). Negative values possible for
# near-zero signal probes. PATH B: use limma or ttest. Do NOT use DESeq2.

feature_id_type: probe_id
# var.index contains Affymetrix GPL570 probe IDs.
# Gene symbols available in var['gene_symbol'] (45782/54675 probes mapped).
# Probe collapse required before enrichment analysis.

description: >
  Pancreatic ductal adenocarcinoma (PDAC) microarray from Collisson et al. 2011
  (Nature Medicine). Defines quasi-mesenchymal (QM), exocrine-like, and classical
  PDAC subtypes. 47 human samples: 27 microdissected tumor tissue + 20 PDAC
  cell lines. Mouse samples (GPL8321) excluded. Collisson subtype labels (QM,
  classical, exocrine-like) are curated from the paper's Supplementary Table 2
  and provided in obs['collisson_subtype'].

publication:
  doi: "10.1038/nm.2344"
  authors: "Collisson EA, Sadanandam A, Olson P, et al."
  year: 2011
  journal: "Nature Medicine"
  title: "Subtypes of pancreatic ductal adenocarcinoma and their differing responses to therapy"

expression_source:
  type: url
  url: "https://huggingface.co/datasets/anne-voigt/pdac-research-data/resolve/main/gse17891_collisson.h5ad"
  format: h5ad
  collapsed_url: "https://huggingface.co/datasets/anne-voigt/pdac-research-data/resolve/main/gse17891_collisson_collapsed.h5ad"
  note: >
    Pre-assembled h5ad from GEO series matrix (47 human samples x 54675 probes,
    float32 RMA log2 expression). Hosted at anne-voigt/pdac-research-data.
    Mouse samples (GPL8321) excluded at assembly.

metadata_source:
  type: geo_series_matrix
  embedded: true
  note: >
    GEO sample characteristics: tissue (tumor tissue samples only) and cell_line
    (cell line samples only). Collisson subtypes are NOT in GEO; obs['collisson_subtype']
    was added from Collisson 2011 Suppl Table 2 (provenance in .uns).

sample_id_column: null
# GSM accession IDs stored in obs.index.

# ---------------------------------------------------------------------------
# Metadata column definitions
# ---------------------------------------------------------------------------

metadata_columns:

  tissue:
    role: sample_origin
    biological_grouping_allowed: true
    allowed_values:
      - "ductal adenocarcinoma tumor"
      - ""
    missing_values:
      - ""
    empty_value_meaning: >
      Empty tissue means this sample is a cell line (annotated in the cell_line column).
      27/47 samples have tissue annotation.
    interpretation_warning: >
      Use 'tissue' to filter to tumor tissue samples for DE analyses.
      Cell line samples (empty tissue, non-empty cell_line) behave differently
      from primary tumors and should be excluded from tumor-based analyses.
    reporting_rules:
      - "Report tissue group sizes from loaded data."
      - "Note whether cell lines were included or excluded."
    refusal_rules:
      - "Refuse to include cell line samples in tumor-specific analyses without explicit user acknowledgment."

  cell_line:
    role: sample_origin
    biological_grouping_allowed: false
    interpretation_warning: >
      cell_line identifies PDAC cell line samples. 20/47 samples are cell lines.
      Do not use cell_line as a DE grouping variable; use it only to filter.
    refusal_rules:
      - "Refuse to use cell_line as a DE grouping variable."

  collisson_subtype:
    role: primary_condition
    biological_grouping_allowed: true
    allowed_values:
      - "QM"
      - "classical"
      - "exocrine-like"
    missing_values:
      - ""
    interpretation_warning: >
      Collisson 2011 PDAssigner subtypes, curated from the paper's Supplementary
      Table 2 (QM = quasi-mesenchymal). 46/47 samples labeled: 27 microdissected
      tumours (8 QM / 14 classical / 5 exocrine-like) and 19 human cell lines
      (11 QM / 8 classical); Capan1 (GSM446778) is unlabeled — not listed in the
      supplement. Empty string = unlabeled. Subtypes are defined on both tumours
      and cell lines; when restricting to tumours via default_sample_filter, expect
      8 QM / 14 classical / 5 exocrine-like.
    reporting_rules:
      - "State that Collisson subtypes are from Collisson 2011 Suppl Table 2 (original
        PDAssigner calls), not recomputed."
      - "Report subtype group sizes from the loaded (and filtered) data."
      - "Note that Capan1 is unlabeled."
    refusal_rules:
      - "Refuse subtype analysis that includes unlabeled (empty-string) samples — filter them out first."

# ---------------------------------------------------------------------------
# Dataset-level guardrails
# ---------------------------------------------------------------------------

default_sample_filter: "tissue == 'ductal adenocarcinoma tumor'"
default_sample_filter_note: >
  Default filter restricts analysis to primary tumor tissue samples (27/47).
  The 20 PDAC cell line samples have empty 'tissue' values and are excluded
  unless the user explicitly requests cell line analysis.
  Apply as: adata = adata[adata.obs.eval(default_sample_filter)].

reporting_rules:
  - "State that expression values are RMA-normalized log2 intensities from Affymetrix GPL570."
  - >
    ALWAYS state upfront: 'Analysis restricted to primary tumor tissue samples
    (27/47). 20 PDAC cell line samples were excluded by default. To include
    cell lines, explicitly request them.'
  - "State that Collisson subtypes (QM/classical/exocrine-like) come from the original
    Collisson 2011 Suppl Table 2 calls (not deposited in GEO, not recomputed)."
  - "Probe collapse to gene symbols is required before enrichment or pathway analysis."

refusal_rules:
  - "Refuse DESeq2 — data_level is log_expression, not raw_counts."
  - "Refuse survival analysis — no survival data in this dataset."
  - "Refuse cell-line-inclusive DE analyses when user intent is to characterize primary tumors."

# ---------------------------------------------------------------------------
# Analysis configuration
# ---------------------------------------------------------------------------

group_columns:
  - "tissue"
  - "collisson_subtype"

feature_mapping:
  requires_collapse: true
  gene_symbol_column: "gene_symbol"
  collapse_method: "mean"
  multi_gene_policy: "first"

survival_columns:
  event_column: null
  time_column: null

default_contrasts:
  # Collisson subtype contrast on tumour tissue (cell lines excluded). classical
  # (14) vs QM (8) is the most-populated, biologically interpretable comparison.
  - design_factor: "collisson_subtype"
    test_group: "QM"
    control_group: "classical"
    subset_query: "tissue == 'ductal adenocarcinoma tumor' and collisson_subtype.isin(['QM', 'classical'])"
    method: limma
    fallback_method: ttest
    note: >
      Quasi-mesenchymal vs classical PDAC tumours (Collisson 2011 subtypes).
      Restricted to microdissected tumour tissue (excludes cell lines and the 5
      exocrine-like tumours). Expected ~8 QM vs ~14 classical — verify group sizes
      from loaded data. limma is appropriate for RMA-normalized log2 microarray data.

valid_workflows:
  - microarray
  - activity_scoring
  - activity_stats

limitations:
  - "Collisson subtypes (quasi-mesenchymal/QM, classical, exocrine-like) are provided in
    obs['collisson_subtype'], curated from Collisson 2011 Nature Medicine Supplementary
    Table 2 (the original PDAssigner calls; not in GEO, not recomputed). 46/47 samples
    are labeled; Capan1 (GSM446778) is not listed in the supplement and is left unlabeled."
  - "20/47 samples are PDAC cell lines, not primary tumor tissue. Filter to tumor tissue
    (non-empty 'tissue' column) for tumor-specific analyses."
  - "No normal tissue samples — tumor vs. normal DE is not possible."
  - "No survival data available."
  - "Probe IDs require collapse to gene symbols before enrichment analysis."
  - "Value range includes negative values (-7.99 to 14.95) — expected for RMA normalization;
    do not treat negatives as missing or invalid."
