# Zhang et al. — GSE28735
# PDAC bulk microarray — matched tumor vs adjacent non-tumor tissue
#
# Reference: Zhang G et al. (2012)
#            "Identification of a novel model for gene expression profiling
#             of pancreatic ductal adenocarcinoma"
#            https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE28735
#
# VALIDATED: column names and values confirmed by loading actual GEO data (June 2026).
# Golden counts: T=45 tumor, N=45 normal, total=90 (confirmed from obs).
# CORRECTION: var.index contains 7-digit numeric Entrez-style IDs (e.g. 7896736) from
# GPL6244 (one per gene), NOT gene symbols. GPL6244 annotation required before enrichment.
# cancer_death has three values: '0' (no event), '1' (event), 'na' (unknown).

dataset_id: gse28735_pdac

title: "Zhang et al. PDAC Matched Tumor vs Adjacent Non-Tumor Bulk Microarray (GSE28735)"

accession: GSE28735

organism: human

modality: bulk_microarray

platform: "Affymetrix Human Gene 1.0 ST Array (GPL6244)"

data_level: log_expression
# Affymetrix RMA-normalised log2 expression values.
# Do NOT apply DESeq2 or decoupler_preprocess_data.

feature_id_type: entrez_id
# var.index contains 7-digit numeric IDs (e.g. 7896736) from the Affymetrix Human
# Gene 1.0 ST Array (GPL6244). Each probeset maps 1:1 to an Entrez gene ID.
# Gene symbols are NOT in var.index — annotation via GPL6244 is required before
# enrichment tools: decoupler_annotate_probes_with_gpl(gpl_accession_or_url="GPL6244")
# then decoupler_collapse_probes_to_genes.

description: >
  Pancreatic ductal adenocarcinoma (PDAC) vs. adjacent non-tumoral tissue bulk
  microarray from Zhang et al. 2012. 90 samples: 45 matched tumor-normal pairs
  from the same patients. var.index contains GPL6244 probeset IDs (numeric) —
  probe collapse via GPL6244 annotation is required before enrichment tools.
  Paired design is NOT currently supported — use unpaired analysis (limma/ttest)
  and note the pairing in result summaries. Survival data present (45 pairs,
  cancer_death: 0/1/na, survival_month in integer months).

publication:
  doi: ""
  authors: "Zhang G et al."
  year: 2012
  journal: ""
  title: >
    Identification of a novel model for gene expression profiling
    of pancreatic ductal adenocarcinoma

expression_source:
  type: url
  url: "https://huggingface.co/datasets/anne-voigt/pdac-research-data/resolve/main/gse28735_pdac.h5ad"
  format: h5ad
  collapsed_url: "https://huggingface.co/datasets/anne-voigt/pdac-research-data/resolve/main/gse28735_pdac_collapsed.h5ad"
  note: >
    Pre-assembled h5ad from GEO series matrix (90 samples x 28869 probes,
    log2 expression). var["gene_symbol"] is precomputed from GPL6244's
    gene_assignment column (25293/28869 probes, 87.6% coverage -- GPL6244 has
    no "Gene Symbol" column, see feature_mapping.gene_symbol_column) so
    decoupler_collapse_probes_to_genes does not need a separate
    decoupler_annotate_probes_with_gpl step. Hosted at
    anne-voigt/pdac-research-data. See original_source for the live-load
    fallback.

original_source:
  type: geo_series_matrix
  url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE28nnn/GSE28735/matrix/GSE28735_series_matrix.txt.gz"
  format: gz
  note: >
    Original GEO series matrix used to build the precomputed h5ad above.
    Retained for provenance and rebuild via scripts/assemble_gse28735_pdac.py.

metadata_source:
  type: geo_series_matrix
  embedded: true
  note: >
    Sample characteristics are in !Sample_characteristics_ch1 lines.
    Confirmed column names and values from actual data load (June 2026):
      tissue: 'T' (45 tumor) | 'N' (45 normal)
      survival_month: integer months as string ('1'..'51', 'na')
      cancer_death: '0' (no event) | '1' (event) | 'na' (unknown)

sample_id_column: null

metadata_columns:

  tissue:
    role: primary_condition
    biological_grouping_allowed: true
    allowed_values:
      - "T"   # tumor
      - "N"   # adjacent non-tumoral tissue
    missing_values:
      - ""
      - "NA"
      - "nan"
    empty_value_meaning: >
      No tissue type annotation. Do not infer tissue category from missing value.
    interpretation_warning: >
      Dataset contains 45 matched tumor-normal pairs. Paired DE analysis is not
      currently supported — use limma or ttest treating all samples independently.
      Acknowledge pairing in result summaries: within-patient variation is not
      accounted for and may reduce effective statistical power.
    reporting_rules:
      - "Report counts computed from loaded data, not from this manifest."
      - "Note that paired design is not accounted for in unpaired analysis."
      - "State any subset query applied."
    refusal_rules:
      - "Refuse DESeq2 — data_level is log_expression, not raw_counts."
      - "Refuse to claim paired-analysis results — only unpaired methods are supported."
      - "Refuse enrichment analysis before GPL6244 probe collapse is confirmed."

  survival_month:
    role: clinical
    biological_grouping_allowed: false
    description: "Overall survival in months from surgery."

  cancer_death:
    role: clinical
    biological_grouping_allowed: false
    allowed_values:
      - "0"   # no cancer death (explicit non-event)
      - "1"   # died from cancer
      - "na"  # unknown / missing
    description: "Cancer-specific death event (0=no, 1=yes, na=unknown). Use 1 as event, 0+na as censored."

reporting_rules:
  - "Clarify that expression values are RMA-normalised log2 intensities."
  - "Note that GPL6244 probe collapse to gene symbols is required before enrichment analysis."
  - "Note the paired design limitation (45 matched pairs, unpaired analysis used)."
  - "State any subset query used."

refusal_rules:
  - "Refuse DESeq2 — data_level is log_expression, not raw_counts."
  - "Refuse to claim paired analysis was performed."
  - "Refuse enrichment analysis before GPL6244 probe collapse step is confirmed."
  - "Refuse survival analysis unless survival_month and cancer_death columns are explicitly loaded and confirmed present."

group_columns:
  - "tissue"

feature_mapping:
  requires_collapse: true
  gene_symbol_column: "gene_symbol"
  collapse_method: mean
  multi_gene_policy: drop
  # NOTE: GPL6244 (Affy Human Gene 1.0 ST) has no "Gene Symbol" column in its
  # platform table -- var["gene_symbol"] is precomputed from the
  # "gene_assignment" column (first '///'-group's 2nd '//'-field) by
  # scripts/assemble_gse28735_pdac.py / annotate_with_gpl_gene_assignment.

survival_columns:
  event_column: "cancer_death"   # 1 = event, na = censored
  time_column: "survival_month"

default_contrasts:
  - design_factor: "tissue"
    test_group: "T"
    control_group: "N"
    subset_query: null
    method: limma
    fallback_method: ttest
    # limma preferred for RMA-normalised microarray data.
    # 45 paired samples — unpaired analysis only; note limitation.

valid_workflows:
  - microarray
  - activity_scoring
  - activity_stats

limitations:
  - "GPL6244 annotation required before enrichment analysis — var.index has Entrez-style numeric IDs (GPL6244), not gene symbols."
  - "Paired tumor-normal design (45 matched pairs) — paired DE not currently supported; unpaired limma/ttest used instead."
  - "Survival data present (survival_month, cancer_death: 0/1/na) but survival analysis not yet validated for this dataset."
