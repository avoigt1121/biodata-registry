# Mayo Clinic — GSE16515
# PDAC bulk microarray — pancreatic tumor vs normal tissue (Mayo Clinic)
#
# Reference: Pei H et al. (2009)
#            https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE16515
#
# VALIDATED: column names and values confirmed from GEO header inspection (June 2026).
# Golden counts: tumor=36, normal=16, total=52

dataset_id: gse16515_mayo

title: "Mayo Clinic PDAC Tumor vs Normal Bulk Microarray (GSE16515)"

accession: GSE16515

organism: human

modality: bulk_microarray

platform: "Affymetrix Human Genome U133 Plus 2.0 Array (GPL570)"

data_level: normalized
# GEO series matrix contains linear-scale normalized expression values (NOT log2).
# Values range ~2-65000; 48% of values exceed 20, inconsistent with log2 RMA.
# (Compare: GSE71989 on the same GPL570 platform has log2 values in 3-15 range.)
# Log2-transform before limma/ttest: X_log2 = log2(X + 1) or np.log2(X).
# Do NOT use DESeq2 or decoupler_preprocess_data.

feature_id_type: probe_id
# var.index contains Affymetrix probe IDs — must be collapsed to gene symbols
# using decoupler_annotate_probes_with_gpl(gpl_accession_or_url="GPL570") then
# decoupler_collapse_probes_to_genes before running enrichment tools.

description: >
  Pancreatic tumor vs. normal tissue bulk microarray from Mayo Clinic (Pei et al. 2009).
  52 samples: 36 tumor and 16 normal. 16 samples are matched tumor-normal pairs
  from the same patients; 20 additional tumor-only samples. Paired design is NOT
  currently supported — use unpaired analysis (limma/ttest) and note the pairing.
  IMPORTANT: GEO series matrix is in linear-scale normalized form (NOT log2).
  Log2-transform before differential expression analysis.

publication:
  doi: ""
  authors: "Pei H et al."
  year: 2009
  journal: ""
  title: >
    Expression data from Mayo Clinic Pancreatic Tumor and Normal samples

expression_source:
  type: geo_series_matrix
  url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE16nnn/GSE16515/matrix/GSE16515_series_matrix.txt.gz"
  format: gz

metadata_source:
  type: geo_series_matrix
  embedded: true
  note: >
    Confirmed columns from GEO header:
      tissue: "Tumor Tissue in Pancreatic Cancer Sample" (36) | "Normal Tissue in Pancreatic Cancer Sample" (16)
      sex: "Male" (34) | "Female" (18)
      age: integer string (57, 69, 74, ...)

sample_id_column: null

metadata_columns:

  tissue:
    role: primary_condition
    biological_grouping_allowed: true
    allowed_values:
      - "Tumor Tissue in Pancreatic Cancer Sample"
      - "Normal Tissue in Pancreatic Cancer Sample"
    missing_values:
      - ""
      - "NA"
      - "nan"
    empty_value_meaning: >
      No tissue type annotation. Do not infer tissue category from missing value.
    interpretation_warning: >
      Dataset contains 16 matched tumor-normal pairs (plus 20 tumor-only samples).
      Paired DE analysis is not currently supported — use limma or ttest treating
      all samples independently. Acknowledge pairing in result summaries.
    reporting_rules:
      - "Report counts computed from loaded data, not from this manifest."
      - "Note that paired design is not accounted for in unpaired analysis."
      - "State any subset query applied."
    refusal_rules:
      - "Refuse DESeq2 — data_level is normalized (linear scale), not raw_counts."
      - "Refuse limma/ttest without first log2-transforming the data."
      - "Refuse survival analysis — no survival endpoints in this GEO submission."
      - "Refuse to claim paired-analysis results — only unpaired methods are supported."

  sex:
    role: covariate
    biological_grouping_allowed: true
    allowed_values:
      - "Male"
      - "Female"

  age:
    role: covariate
    biological_grouping_allowed: false
    description: "Patient age at diagnosis (integer string)."

reporting_rules:
  - "Clarify that expression values are linear-scale normalized intensities — NOT log2."
  - "Note that log2 transformation is required before differential expression analysis."
  - "Note that probe collapse to gene symbols is required before enrichment analysis."
  - "Note the paired design limitation (16 matched pairs + 20 tumor-only, unpaired analysis used)."
  - "State any subset query used."

refusal_rules:
  - "Refuse DESeq2 — data_level is normalized (linear scale), not raw_counts."
  - "Refuse limma/ttest without first log2-transforming the data."
  - "Refuse enrichment analysis before probe collapse step is confirmed."
  - "Refuse to claim paired analysis was performed."

group_columns:
  - "tissue"

feature_mapping:
  requires_collapse: true
  gene_symbol_column: "Gene Symbol"
  collapse_method: mean
  multi_gene_policy: drop

survival_columns:
  event_column: null
  time_column: null

default_contrasts:
  - design_factor: "tissue"
    test_group: "Tumor Tissue in Pancreatic Cancer Sample"
    control_group: "Normal Tissue in Pancreatic Cancer Sample"
    subset_query: null
    method: limma
    fallback_method: ttest

valid_workflows:
  - microarray
  - activity_scoring
  - activity_stats

limitations:
  - "GEO series matrix is in linear-scale normalized form — must log2-transform before DE analysis."
  - "Probe collapse to gene symbols (GPL570) required before enrichment analysis."
  - "Paired tumor-normal design (16 matched pairs) — paired DE not currently supported; unpaired limma/ttest used instead."
  - "Imbalanced: 36 tumor vs 16 normal."
  - "No survival endpoints in this GEO submission."
