# Chen et al. — GSE71989
# PDAC bulk microarray — normal pancreas vs PDAC vs chronic pancreatitis
#
# Reference: Chen X et al. (2016)
#            https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE71989
#
# VALIDATED: column names and values confirmed from GEO header inspection (June 2026).
# Golden counts: PDAC=13, normal pancreatic tissue=8, CP=1, total=22
# Primary grouping column: tissue_subtype (NOT tissue — tissue is "pancrea" for all)

dataset_id: gse71989_chen

title: "Chen et al. Normal Pancreas and PDAC Bulk Microarray (GSE71989)"

accession: GSE71989

organism: human

modality: bulk_microarray

platform: "Affymetrix Human Genome U133 Plus 2.0 Array (GPL570)"

data_level: log_expression
# Affymetrix RMA-normalised log2 expression values.
# Do NOT apply DESeq2 or decoupler_preprocess_data.

feature_id_type: probe_id
# var.index contains Affymetrix probe IDs — must be collapsed to gene symbols
# using decoupler_annotate_probes_with_gpl(gpl_accession_or_url="GPL570") then
# decoupler_collapse_probes_to_genes before running enrichment tools.

description: >
  Pancreatic ductal adenocarcinoma (PDAC) vs. normal pancreatic tissue bulk
  microarray from Chen et al. 22 samples: 8 normal pancreatic tissue, 13 PDAC,
  1 chronic pancreatitis. Small cohort; treat results as exploratory.
  Primary grouping column is tissue_subtype (NOT tissue, which is uninformative).

preprocessing: >
  Pre-assembled from the GEO series matrix: Affymetrix U133 Plus 2.0 (GPL570)
  RMA-normalized log2 expression (22 samples x 54675 probes). var.index holds
  GPL570 probe IDs; HGNC symbols are precomputed into var['Gene Symbol'] via
  GPL570 annotation (83.7% coverage). Small cohort — treat results as
  exploratory. Path B (limma/ttest).

publication:
  doi: ""
  authors: "Chen X et al."
  year: 2016
  journal: ""
  title: "The gene expression of normal pancreatic and PDAC tissues"

expression_source:
  type: url
  url: "https://huggingface.co/datasets/anne-voigt/pdac-research-data/resolve/main/gse71989_chen.h5ad"
  format: h5ad
  collapsed_url: "https://huggingface.co/datasets/anne-voigt/pdac-research-data/resolve/main/gse71989_chen_collapsed.h5ad"
  note: >
    Pre-assembled h5ad from GEO series matrix (22 samples x 54675 probes,
    log2 expression). var["Gene Symbol"] is precomputed via GPL570
    annotation (45782/54675 probes, 83.7% coverage) so
    decoupler_collapse_probes_to_genes does not need a separate
    decoupler_annotate_probes_with_gpl step. Hosted at
    anne-voigt/pdac-research-data. See original_source for the live-load
    fallback.

original_source:
  type: geo_series_matrix
  url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE71nnn/GSE71989/matrix/GSE71989_series_matrix.txt.gz"
  format: gz
  note: >
    Original GEO series matrix used to build the precomputed h5ad above.
    Retained for provenance and rebuild via scripts/assemble_gse71989_chen.py.

metadata_source:
  type: geo_series_matrix
  embedded: true
  note: >
    Confirmed columns from GEO header:
      subject_status: "pancreatic ductal adenocarcinoma (PDAC) patient" (13) | "Normal" (8) | "Chronic Pancreatitis" (1)
      tissue: "pancrea" (all 22) — uninformative, do not use for grouping
      tissue_subtype: "PDAC" (13) | "normal pancreatic tissue" (8) | "CP" (1)
    Use tissue_subtype as the grouping column. Exclude CP sample for PDAC vs normal.

sample_id_column: null

metadata_columns:

  tissue_subtype:
    role: primary_condition
    biological_grouping_allowed: true
    allowed_values:
      - "PDAC"
      - "normal pancreatic tissue"
      - "CP"
    missing_values:
      - ""
      - "NA"
      - "nan"
    empty_value_meaning: >
      No tissue subtype annotation. Do not infer tissue category from missing value.
    interpretation_warning: >
      Exclude the chronic pancreatitis sample (CP, n=1) when running PDAC vs normal contrast.
      Small sample size (8 normal, 13 PDAC) limits statistical power — treat results
      as exploratory and validate in larger cohorts.
    reporting_rules:
      - "Report counts computed from loaded data, not from this manifest."
      - "State any subset query applied (e.g. excluding CP)."
      - "Note the small sample size in any result summary."
    refusal_rules:
      - "Refuse DESeq2 — data_level is log_expression, not raw_counts."
      - "Refuse survival analysis — no survival endpoints in this GEO submission."
      - "Refuse to include CP sample in PDAC vs. normal contrast without explicit user instruction."

  subject_status:
    role: covariate
    biological_grouping_allowed: true
    allowed_values:
      - "pancreatic ductal adenocarcinoma (PDAC) patient"
      - "Normal"
      - "Chronic Pancreatitis"
    description: "Alternative grouping column; mirrors tissue_subtype with more verbose labels."

  tissue:
    role: covariate
    biological_grouping_allowed: false
    description: "All samples have value 'pancrea' — uninformative, do not use for grouping."

reporting_rules:
  - "Clarify that expression values are RMA-normalised log2 intensities."
  - "Note that probe collapse to gene symbols (GPL570) is required before enrichment analysis."
  - "Note small sample size (n=22 total, n=8 normal, n=13 PDAC) in all result summaries."
  - "State any subset query used."

refusal_rules:
  - "Refuse DESeq2 — data_level is log_expression, not raw_counts."
  - "Refuse survival analysis — survival endpoints not provided."
  - "Refuse enrichment analysis before probe collapse step is confirmed."

group_columns:
  - "tissue_subtype"

feature_mapping:
  requires_collapse: true
  gene_symbol_column: "Gene Symbol"
  collapse_method: mean
  multi_gene_policy: drop

survival_columns:
  event_column: null
  time_column: null

default_contrasts:
  - design_factor: "tissue_subtype"
    test_group: "PDAC"
    control_group: "normal pancreatic tissue"
    subset_query: "tissue_subtype != 'CP'"
    method: limma
    fallback_method: ttest

valid_workflows:
  - microarray
  - activity_scoring
  - activity_stats

limitations:
  - "Probe collapse to gene symbols (GPL570) required before enrichment analysis."
  - "Small sample size (8 normal, 13 PDAC, 1 CP) — treat results as exploratory."
  - "Chronic pancreatitis sample must be excluded from PDAC vs. normal contrast."
  - "No survival endpoints provided in this GEO submission."
  - "tissue column is uninformative ('pancrea' for all) — use tissue_subtype for grouping."
