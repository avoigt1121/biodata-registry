# TCGA-PAAD — The Cancer Genome Atlas Pancreatic Adenocarcinoma
# Bulk RNA-seq — GDC STAR-Counts (raw integer counts, Path A / DESeq2)
#
# Expression: raw integer counts from GDC STAR-Counts pipeline
#             Downloaded per-sample via GDC bulk data API (open access)
# Clinical:   UCSC Xena legacy PAAD_clinicalMatrix (vital_status, days_to_death,
#             days_to_last_followup) — joined by sample barcode
#
# ⚠ CONTAMINATION WARNING (Knudsen et al. 2019, PMC6357157):
#   ~18.9% of samples (35/185) in the TCGA-PAAD cohort are NOT PDAC —
#   they include adjacent normal tissue, neuroendocrine tumors, and
#   contaminated biopsies. Using the uncurated cohort produces 5,312
#   apparent prognostic genes; the curated PDAC-only set yields 4.
#   This manifest loads the FULL uncurated cohort. DO NOT use survival
#   or prognostic analyses without first curating to PDAC-only samples.
#
# PATH A: data_level=raw_counts → DESeq2. Do NOT apply limma/ttest or
#         skip decoupler_preprocess_data on this dataset.
#
# VALIDATED: GDC API access confirmed open-access (June 2026).
# Feature IDs: HGNC gene symbols (extracted from gene_name column in
#              STAR-Counts TSVs). Ensembl IDs stored in adata.var['ensembl_id'].

dataset_id: tcga_paad

title: "TCGA-PAAD Pancreatic Adenocarcinoma RNA-seq (GDC STAR-Counts)"

accession: TCGA-PAAD

organism: human

modality: bulk_rnaseq

platform: "Illumina HiSeq 2000/2500 (GDC STAR-Counts pipeline, hg38 / GENCODE v36)"

data_level: raw_counts
# Raw integer counts from STAR aligner via GDC harmonized pipeline.
# PATH A: use DESeq2 for differential expression.
# Run decoupler_load_and_filter_data → decoupler_preprocess_data before DESeq2.
# Do NOT use limma, ttest, or skip preprocessing on this dataset.

feature_id_type: gene_symbol
# var.index contains HGNC gene symbols (e.g. TSPAN6, TP53, KRAS).
# Extracted from the gene_name column in each GDC STAR-Counts TSV.
# Ensembl IDs (version-stripped) are stored in adata.var['ensembl_id'].
# No probe collapse required before enrichment tools.

dataset_disclaimer: >
  ⚠ DATA QUALITY WARNING — read before interpreting results.
  TCGA-PAAD is widely used but has known contamination: Knudsen et al. (2019,
  PMC6357157) showed ~18.9% of samples are non-PDAC (adjacent normal tissue,
  neuroendocrine tumors, contaminated biopsies). Uncurated survival analyses
  yield 5,312 apparent prognostic genes; the curated PDAC-only set yields 4.
  A curated 150-sample PDAC-only subset is now available and is applied
  automatically by the loading plan for survival analyses.

description: >
  Pancreatic ductal adenocarcinoma (PDAC) bulk RNA-seq from The Cancer Genome
  Atlas (TCGA-PAAD). Raw integer counts from the GDC harmonized STAR-Counts
  pipeline (hg38, GENCODE v36). Full uncurated cohort: ~178 primary tumor and
  ~4 adjacent normal samples; approximately 18.9% of samples are non-PDAC
  (Knudsen et al. 2019). Clinical metadata includes survival endpoints and
  pathologic stage. Survival and prognostic analyses require curation to
  PDAC-only samples — see refusal_rules.

publication:
  doi: "10.1038/ng.2764"
  authors: "TCGA Research Network"
  year: 2017
  journal: "Cancer Cell"
  title: "Integrated Genomic Characterization of Pancreatic Ductal Adenocarcinoma"

expression_source:
  type: url
  url: "https://huggingface.co/datasets/anni-voigt/pdac-research-data/resolve/main/tcga_paad_gdc_star_counts.h5ad"
  format: h5ad
  note: >
    Pre-assembled h5ad from GDC STAR-Counts (183 samples x 59427 genes, raw int32 counts).
    Hosted at anni-voigt/pdac-research-data on HuggingFace.
    Regenerate from source with decoupler_load_gdc_star_counts("TCGA-PAAD").
    data_level=raw_counts — Path A / DESeq2. Do not re-normalize.

metadata_source:
  type: supplementary_table
  embedded: false
  url: "https://tcga.xenahubs.net/download/TCGA.PAAD.sampleMap/PAAD_clinicalMatrix"
  format: tsv
  join_column: "sampleID"
  truncate_to_patient: false
  note: >
    Xena legacy PAAD clinical matrix. Rows = samples, first column 'sampleID'
    contains TCGA sample barcodes matching GDC expression barcodes.
    Key survival columns: vital_status, days_to_death, days_to_last_followup.

sample_id_column: null

# ---------------------------------------------------------------------------
# Metadata column definitions
# ---------------------------------------------------------------------------

metadata_columns:

  vital_status:
    role: clinical
    biological_grouping_allowed: false
    allowed_values:
      - "alive"
      - "dead"
    missing_values:
      - ""
      - "NA"
      - "nan"
    interpretation_warning: >
      vital_status reflects status at last clinical contact. Derive os_event
      and os_days via decoupler_join_clinical_metadata(add_survival_columns=True).
    refusal_rules:
      - "Refuse to use vital_status as a DE grouping variable."
      - "Refuse survival analysis on the uncurated cohort without PDAC-only curation."

  days_to_death:
    role: clinical
    biological_grouping_allowed: false
    description: "Days from diagnosis to death; NaN for living patients."

  days_to_last_followup:
    role: clinical
    biological_grouping_allowed: false
    description: "Days from diagnosis to last clinical contact; NaN for deceased."

  os_event:
    role: clinical
    biological_grouping_allowed: false
    description: "Derived: 0=alive/censored, 1=deceased. From vital_status via join tool."

  os_days:
    role: clinical
    biological_grouping_allowed: false
    description: "Derived: days to event or censoring. From days_to_death / days_to_last_followup."

  sample_type:
    role: sample_origin
    biological_grouping_allowed: true
    allowed_values:
      - "Primary Tumor"
      - "Solid Tissue Normal"
    missing_values:
      - ""
      - "NA"
    interpretation_warning: >
      Only ~4 'Solid Tissue Normal' samples exist. Tumor vs. normal DE is
      severely underpowered. Do not run that comparison.
    refusal_rules:
      - "Refuse tumor vs. normal DE — only ~4 normal samples; the comparison is underpowered."

  pathologic_stage:
    role: primary_condition
    biological_grouping_allowed: true
    allowed_values:
      - "Stage I"
      - "Stage IA"
      - "Stage IB"
      - "Stage II"
      - "Stage IIA"
      - "Stage IIB"
      - "Stage III"
      - "Stage IV"
    missing_values:
      - ""
      - "NA"
      - "[Not Available]"
      - "[Discrepancy]"
    interpretation_warning: >
      Stage groupings have small and uneven sample counts. Most samples are
      Stage II. Stages I, III, IV have very few samples — consider collapsing
      to early (I+II) vs late (III+IV). Always verify group sizes before DE.
    reporting_rules:
      - "Report stage group sizes computed from the loaded data."
      - "Note the uncurated cohort contamination when reporting stage distributions."

# ---------------------------------------------------------------------------
# Dataset-level guardrails
# ---------------------------------------------------------------------------

reporting_rules:
  - "State that expression values are raw integer counts from the GDC STAR-Counts pipeline (hg38/GENCODE v36)."
  - >
    When reporting any DE or enrichment results, explain the method choice in plain language:
    'DESeq2 was used because this dataset contains raw integer read counts from RNA sequencing.
    DESeq2 is a statistical method designed specifically for count data — it models how counts
    naturally vary across samples and produces reliable results. Simpler methods like limma or
    t-test are not appropriate here and are blocked by the manifest.'
  - "State the total sample count (183 total: 178 primary tumor, 4 normal, 1 metastatic) and warn about the 18.9% non-PDAC contamination."
  - "State that survival and prognostic analyses are unreliable on the uncurated cohort."
  - "Cite Knudsen et al. 2019 (PMC6357157) when reporting survival results."

refusal_rules:
  - >
    Refuse limma or ttest for differential expression — data_level is raw_counts.
    DESeq2 is required. Use decoupler_differential_expression(method='deseq2').
  - >
    Refuse to skip decoupler_load_and_filter_data or decoupler_preprocess_data
    before DESeq2. Both steps are required for Path A.
  - >
    Refuse survival or prognostic analysis WITHOUT first applying
    dataset_filter_to_curated_samples. A curated PDAC-only subset of 150 samples
    (Knudsen et al. 2019, PMC6357157) is available — always apply it before
    survival analysis. Uncurated survival yields 5,312 apparent prognostic genes;
    the curated set yields 4. Never present uncurated survival results.
  - >
    Refuse tumor vs. normal DE comparison — only ~4 adjacent normal samples are
    available in TCGA-PAAD. This comparison is statistically underpowered.
  - >
    Refuse to present any TCGA-PAAD findings as PDAC-specific without explicitly
    noting whether curation was applied.

