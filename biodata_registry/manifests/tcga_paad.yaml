# ---------------------------------------------------------------------------
# Analysis configuration
# ---------------------------------------------------------------------------

group_columns:
  - "pathologic_stage"
  - "sample_type"

feature_mapping:
  requires_collapse: false
  # Gene symbols already in var.index — no probe collapse needed.

survival_columns:
  event_column: "os_event"
  time_column: "os_days"
  note: >
    os_event and os_days are derived by decoupler_join_clinical_metadata
    with add_survival_columns=True. Do NOT use survival analysis on the
    uncurated cohort — see refusal_rules.

default_contrasts:
  - design_factor: "pathologic_stage"
    test_group: "Stage IIB"
    control_group: "Stage IIA"
    subset_query: "pathologic_stage.isin(['Stage IIA', 'Stage IIB'])"
    method: deseq2
    note: >
      Stage IIA vs IIB is the most-populated contrast within Stage II.
      Compute group sizes from loaded data before running — expected ~60+ samples.
      DESeq2 is correct here; raw integer counts, Path A.

valid_workflows:
  - activity_scoring
  - activity_stats
  - survival

limitations:
  - >
    CONTAMINATION: ~18.9% of samples (35/185) are non-PDAC (normal pancreas,
    neuroendocrine tumors, metastatic lesions, contaminated biopsies). Cite
    Knudsen et al. 2019 (PMC6357157). A curated PDAC-only subset of 150 samples
    is now available via dataset_filter_to_curated_samples — apply it before any
    survival or prognostic analysis.
  - >
    Only ~4 adjacent normal samples. Tumor vs. normal DE is underpowered
    and should not be run.
  - >
    Stage-stratified analyses are limited by small group sizes outside Stage II.
    Verify group counts before running DE.
  - >
    Survival columns (os_event, os_days) require decoupler_join_clinical_metadata
    before survival analysis.
  - >
    No Moffitt subtype annotations (classical/basal) in the GDC or Xena clinical
    matrix. Subtype classification requires a separate step.
