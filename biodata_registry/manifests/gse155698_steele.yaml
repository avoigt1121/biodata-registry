# Steele 2020 — single-cell PDAC cohort (GSE155698), extracted from the Loveless atlas
#
# Reference: Steele NG, Carpenter ES, Kemp SB, Sirihorachai VR et al.
#   "Multimodal Mapping of the Tumor and Peripheral Blood Immune Landscape in
#    Human Pancreatic Cancer." Nat Cancer 2020 Nov;1(11):1097-1112. PMID: 34296197
#
# PROVENANCE / SCOPE:
#   This is the GSE155698 (Steele lab) subset of the Loveless integrated PDAC
#   single-cell ATLAS (Zenodo 10.5281/zenodo.14199536, scAtlas.rds.gz; >700k cells
#   across 12 studies). We extracted ONE study's RAW COUNTS (RNA assay) so the
#   dataset is a clean, single-platform single-cell cohort for pseudobulk DE and
#   per-cell / pseudobulk activity scoring — NOT the batch-corrected atlas itself
#   (that stays an offline reference; pooling across its 12 studies is confounded).
#
# SINGLE-CELL ROUTING (analysis_path 'P'):
#   modality sc_rnaseq -> analysis_path 'P' (pseudobulk/annotation), NOT Path A,
#   even though data_level is raw_counts. DESeq2 runs on SAMPLE-LEVEL pseudobulk
#   (aggregate cells by sample_id_column first); never DESeq2 per cell
#   (pseudoreplication). Never pool with bulk datasets — the integration engine's
#   CROSS_RESOLUTION gate refuses that.
#
# COLUMN NAMES are as stored in the atlas obs (R make.names mangling: dots for
#   spaces/punctuation), e.g. 'GSE.SRA..Study.', kept verbatim so they match the data.

dataset_id: gse155698_steele

title: "Steele 2020 PDAC single-cell RNA-seq (GSE155698; Loveless atlas subset)"

accession: GSE155698

organism: human

modality: sc_rnaseq

platform: "10x Genomics Chromium scRNA-seq (counts as integrated into the Loveless atlas, Zenodo 14199536)"

data_level: raw_counts
# Raw UMI counts (RNA assay 'counts' layer). single-cell -> analysis_path 'P':
# aggregate to pseudobulk by sample_id_column, then DESeq2; or per-cell activity
# scoring. Do NOT run cell-level DESeq2.

feature_id_type: gene_symbol
# 36,601 genes from the atlas RNA assay rownames (standard 10x/CellRanger gene
# symbols). No probe collapse. CONFIRM against var.index on first load.

dataset_disclaimer: >
  Single-cell PDAC cohort (Steele 2020, GSE155698) carved from the Loveless
  integrated atlas. Cells span tumor and (in this study) peripheral blood / normal
  compartments; cell types are in 'Clusters'. This is single-cell data: report
  per-sample pseudobulk results for differential expression (aggregate cells by
  'Name' first), never cell-level p-values, and never pool with bulk cohorts.
  Group/sample sizes must be computed from the loaded data.

description: >
  Single-cell RNA-seq of human PDAC from Steele et al. 2020 (GSE155698), extracted
  as raw counts from the Loveless integrated single-cell atlas (Zenodo
  10.5281/zenodo.14199536). One consistent platform/cohort for pseudobulk
  differential expression and decoupleR activity scoring. The full multi-study
  atlas is retained separately as an offline reference (batch-corrected; not a
  live-computed dataset).

preprocessing: >
  Cells with GSE.SRA..Study. == 'GSE155698' were subset from the Loveless atlas
  h5ad (RNA assay raw counts only; corrected/scaled/integrated layers dropped at
  atlas conversion). obs columns are carried verbatim from the atlas
  (R make.names naming). var.index holds gene symbols. Hosted as an h5ad on
  anne-voigt/pdac-research-data (loveless/GSE155698.h5ad).

publication:
  pmid: "34296197"
  authors: "Steele NG, Carpenter ES, Kemp SB, Sirihorachai VR, et al."
  year: 2020
  journal: "Nature Cancer"
  title: >
    Multimodal Mapping of the Tumor and Peripheral Blood Immune Landscape in
    Human Pancreatic Cancer
  note: >
    Counts re-used here via the Loveless integrated atlas
    (Zenodo 10.5281/zenodo.14199536, CC-BY-4.0), not downloaded from GEO directly.

expression_source:
  type: url
  url: "https://huggingface.co/datasets/anne-voigt/pdac-research-data/resolve/main/loveless/GSE155698.h5ad"
  format: h5ad
  note: >
    Single-study subset of the Loveless atlas (cells where GSE.SRA..Study.
    == 'GSE155698'); RNA-assay raw counts (cells x 36601 genes), obs metadata
    embedded. Produced by scripts/ingest/loveless (Pass 2 subset). CONFIRM the
    URL resolves (HTTP 200) after upload.

original_source:
  type: url
  url: "https://zenodo.org/records/14199536/files/scAtlas.rds.gz?download=1"
  format: rds
  note: >
    Loveless integrated PDAC single-cell atlas (Seurat .rds, double-gzipped,
    ~33 GB, >700k cells, 12 studies). GEO original for this study: GSE155698.

metadata_source:
  type: local
  embedded: true
  note: >
    obs carried from the atlas. Sample key 'Name'; study 'GSE.SRA..Study.';
    cell type 'Clusters'; condition 'DiseaseState' / 'Treatment'.

sample_id_column: "Name"
# Per-sample identifier — the pseudobulk AGGREGATION KEY. Aggregate cells by
# 'Name' to sample-level pseudobulk before any DESeq2 / meta-analysis.

# ---------------------------------------------------------------------------
# Metadata column semantic definitions (values from the atlas; per-subset
# presence/sizes must be computed from the loaded data)
# ---------------------------------------------------------------------------
metadata_columns:

  Clusters:
    role: sample_origin
    biological_grouping_allowed: true
    allowed_values:
      - "DUCTAL"
      - "CYCLING DUCTAL"
      - "ACINAR"
      - "ENDOCRINE"
      - "FIBROBLASTS"
      - "ENDOTHELIAL"
      - "PERICYTES"
      - "MYELOID"
      - "CYCLING. MYELOID"
      - "TNK"
      - "CYCLING TNK"
      - "B CELLS"
      - "PLASMA"
      - "MAST"
    interpretation_warning: >
      Author-provided cell-type annotation (atlas-wide vocabulary). Use as the
      cell-type grouping for per-cell-type pseudobulk or activity scoring. Not
      every type is present in every study — compute the types and per-type cell
      counts from the loaded subset.
    reporting_rules:
      - "Report cell-type composition as computed from the loaded subset."

  DiseaseState:
    role: primary_condition
    biological_grouping_allowed: true
    allowed_values:
      - "Primary tumor"
      - "Adjacent normal"
      - "Metastatic lesion"
      - "Donor"
    missing_values:
      - ""
      - "NA"
      - "nan"
    interpretation_warning: >
      Tissue/disease compartment. 'Donor' (healthy peripheral blood) belongs to
      other atlas studies, not Steele; confirm which states are present in this
      subset and their per-sample counts before any contrast.
    refusal_rules:
      - "Refuse a contrast arm with fewer than ~3 pseudobulk samples."

  Treatment:
    role: secondary_condition
    biological_grouping_allowed: true
    allowed_values:
      - "Treatment naïve"
      - "Treatment"
      - "Unknown"
      - "N_A"
    missing_values:
      - "Unknown"
      - "N_A"
      - ""
    interpretation_warning: >
      Prior-treatment status. Pool size per arm must be computed from the loaded
      subset; many Steele samples are treatment-naïve.

# ---------------------------------------------------------------------------
# Dataset-level reporting and refusal rules
# ---------------------------------------------------------------------------
reporting_rules:
  - "Report cell counts, cell-type composition, and per-sample/per-arm sizes as computed from the loaded data."
  - "State that differential expression is computed on SAMPLE-LEVEL PSEUDOBULK (cells aggregated by 'Name'), not per cell."
  - "State the study of origin (Steele 2020, GSE155698) and that counts came via the Loveless atlas."

refusal_rules:
  - "Refuse cell-level differential-expression p-values — aggregate to pseudobulk by 'Name' first (cells are not independent replicates)."
  - "Refuse to pool or integrate with any bulk dataset — single-cell and bulk are different resolutions (CROSS_RESOLUTION)."
  - "Refuse to pool with the full Loveless atlas or its other study subsets for DE — cross-study integration here is batch-confounded."
  - "Refuse a pseudobulk contrast arm with fewer than ~3 samples (compute sizes from the loaded data)."
  - "Refuse survival analysis — no survival/outcome endpoints are provided."

# ---------------------------------------------------------------------------
# Analysis configuration
# ---------------------------------------------------------------------------
group_columns:
  - "Clusters"
  - "DiseaseState"
  - "Treatment"

feature_mapping:
  requires_collapse: false
  # gene symbols in var.index; no probe collapse.

survival_columns:
  event_column: null
  time_column: null

default_contrasts:
  - design_factor: "DiseaseState"
    test_group: "Primary tumor"
    control_group: "Adjacent normal"
    subset_query: "DiseaseState in ['Primary tumor', 'Adjacent normal']"
    method: deseq2
    note: >
      Pseudobulk DE: aggregate cells by 'Name' to sample-level counts (optionally
      within a 'Clusters' cell type), then DESeq2. Confirm both arms have >=3
      samples in this subset before running.

valid_workflows:
  - sc_annotation
  - pseudobulk_de
  - activity_scoring

limitations:
  - "Single-cell data: differential expression must be done on per-sample pseudobulk (aggregate by 'Name'); cell-level p-values are pseudoreplication and are refused."
  - "Never pool with bulk datasets (different resolution) — enforced by the integration engine's CROSS_RESOLUTION gate."
  - "Counts come via the Loveless integrated atlas (Zenodo 14199536), not a direct GEO download; the atlas authors' QC/cell filtering and cell-type annotation ('Clusters') are inherited."
  - "feature_id_type is gene_symbol inferred from the atlas RNA assay (36,601 genes); confirm var.index are symbols on first load."
  - "Per-study presence of DiseaseState/Treatment arms and per-arm sample counts are NOT fixed here — compute them from the loaded subset before any contrast."
  - "No survival or clinical-outcome fields are provided."
  - "Do not integrate this subset with other single-study subsets of the same atlas for DE — that re-introduces the cross-study batch confound the subsetting avoids."
