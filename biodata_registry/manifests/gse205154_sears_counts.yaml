# Sears lab (OHSU) — GSE205154 estimated COUNTS variant (Path A / DESeq2)
# PDAC primary + metastatic FFPE bulk RNA-seq — gene-level estimated counts
#
# Reference: PMID 39789181
#   "Ongoing replication stress tolerance and clonal T cell responses
#    distinguish liver and lung recurrence and outcomes in pancreatic cancer"
#   Contact: Rosalie Sears lab, Oregon Health & Science University.
#
# SCOPE NOTE:
#   GSE205154 is the bulk RNA-seq subseries of SuperSeries GSE281129 (the other
#   subseries, GSE281005, is TCRbeta-seq and out of scope). This manifest is the
#   estimated-COUNTS quantification of that cohort.
#
# SIBLING VARIANTS (same 289-sample cohort, different quantification):
#   gse205154_sears        — TPM        (Path B, limma/ttest)
#   gse205154_sears_counts — est. counts (this file; Path A, DESeq2 on int32)
#   gse205154_sears_tmm    — edgeR TMM  (Path B, limma/ttest on normalized)
#   Pick ONE per analysis; never pool across variants (identical samples).
#
# VALIDATION STATUS:
#   Confirmed from GSE205154_Gene_Level_Counts_Estimates.txt.gz: 289 sample
#   columns (ST-<id>-T/-M/-F) keyed by versioned Ensembl IDs, with ensembl_gene_id
#   / hgnc_symbol / gene_biotype / gene_name annotation columns. Values are
#   tximport ESTIMATED counts — NON-integer (e.g. 613.70206) — see limitations.

dataset_id: gse205154_sears_counts

title: "Sears Lab PDAC Bulk RNA-seq — Estimated Counts / DESeq2 (GSE205154; SuperSeries GSE281129)"

accession: GSE205154

organism: human

modality: bulk_rnaseq

platform: "Illumina HiSeq 4000 (kallisto v0.44.0 pseudoalignment, GRCh38.p5 / GENCODE v24, tximport gene-level)"

data_level: raw_counts
# tximport gene-level estimated counts, ROUNDED to int32 at assembly for DESeq2
# compatibility (mirrors paca_ca_rnaseq). PATH A: run decoupler_preprocess_data
# then DESeq2. Do NOT use limma/ttest on this variant — use gse205154_sears
# (TPM) or gse205154_sears_tmm for Path B.

feature_id_type: ensembl_gene_id
# Versioned Ensembl gene IDs in var.index (e.g. ENSG00000000003.14); HGNC
# symbols exposed as var['SYMBOL'] from the hgnc_symbol column. No probe collapse.

dataset_disclaimer: >
  Sears lab (OHSU) PDAC cohort: 289 FFPE tumor samples (218 primary, 71
  metastatic). This is the estimated-counts variant for DESeq2. Counts are
  kallisto/tximport ESTIMATED counts rounded to integers — an approximation of
  true read counts (see limitations); for the recommended tximport→DESeq2
  offset workflow use the raw GEO file directly. The liver-vs-lung
  metastatic-tropism grouping that defines this study's signature is NOT in the
  GEO metadata (clinical chart review; raw data dbGaP phs003597). FFPE RNA;
  interpret low-expression genes with caution.

description: >
  Bulk RNA-seq of 289 primary and metastatic PDAC tumors from FFPE blocks
  (Sears lab, OHSU; GSE205154, bulk RNA-seq subseries of SuperSeries GSE281129).
  Gene-level estimated counts from tximport over kallisto pseudoalignment,
  rounded to int32 for DESeq2 (Path A). Estimated-counts and TMM/TPM variants
  share the same samples — see sibling manifests gse205154_sears (TPM) and
  gse205154_sears_tmm (TMM).

publication:
  pmid: "39789181"
  authors: "Sears RC, et al. (Brenden-Colson Center for Pancreatic Care, OHSU)"
  year: 2025
  title: >
    Ongoing replication stress tolerance and clonal T cell responses
    distinguish liver and lung recurrence and outcomes in pancreatic cancer
  note: >
    GSE205154 is the bulk RNA-seq subseries of SuperSeries GSE281129.
    Companion subseries GSE281005 holds TCRbeta-seq (out of scope here).
    Raw sequencing deposited in dbGaP phs003597.v1.p1; BioProject PRJNA844022.

expression_source:
  type: url
  url: "https://huggingface.co/datasets/anne-voigt/pdac-research-data/resolve/main/gse205154_sears_counts.h5ad"
  format: h5ad
  note: >
    PLACEHOLDER — the pre-assembled h5ad has not been built/uploaded yet.
    Intended contents: gene-level estimated counts rounded to int32 (289 samples
    x genes) from GSE205154_Gene_Level_Counts_Estimates.txt.gz with embedded obs
    metadata. Until uploaded to anne-voigt/pdac-research-data this URL will 404;
    assemble from original_source below. See REGISTRY_TODO_PLANS.md.

original_source:
  type: url
  url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE205nnn/GSE205154/suppl/GSE205154_Gene_Level_Counts_Estimates.txt.gz"
  format: gz
  note: >
    GEO supplementary gene-level estimated-counts matrix (tab-delimited).
    Leading columns: ID (versioned Ensembl), ensembl_gene_id, hgnc_symbol,
    gene_biotype, gene_name; followed by 289 sample columns named ST-<id>-T/-M/-F
    (1:1 with the 289 GEO samples). Values are NON-integer tximport estimates;
    round to int32 at assembly for DESeq2.

metadata_source:
  type: geo_series_matrix
  embedded: true
  note: >
    Sample characteristics are in !Sample_characteristics_ch1 lines of the
    GSE205154 series matrix. Exposed fields: 'tumor type' (Primary/Met),
    'tissue' (anatomical site), 'cell type' (constant: scraped tumor).
    Sample names follow ST-<id>-T (primary) / ST-<id>-M (metastatic).

sample_id_column: null
# GSM accession IDs are stored in the obs DataFrame index, not a column.

# ---------------------------------------------------------------------------
# Metadata column semantic definitions
# ---------------------------------------------------------------------------

metadata_columns:

  tumor_type:
    role: primary_condition
    biological_grouping_allowed: true
    allowed_values:
      - "Primary"
      - "Met"
    missing_values:
      - ""
      - "NA"
      - "nan"
    source_column: "tumor type"
    decoded_column: "tumor_type"
    interpretation_warning: >
      Primary (218) vs metastatic (71) tumors. Metastatic samples span several
      anatomical sites (see `tissue`); they are not a single homogeneous group.
      Compute group sizes from the loaded data before comparing.
    reporting_rules:
      - "Report Primary and Met counts as computed from the loaded data."
      - "State that metastatic samples are pooled across anatomical sites unless tissue-stratified."
    refusal_rules:
      - "Refuse to equate `tumor type: Met` with a specific metastatic site — Met pools liver, lung, peritoneum and others."

  tissue:
    role: sample_origin
    biological_grouping_allowed: true
    allowed_values:
      - "Pancreas"
      - "Liver"
      - "Lung"
      - "Peritoneum"
      - "Duodenum"
      - "Omentum"
      - "Retroperitoneum"
      - "Falciform Ligament"
      - "Mesocolon"
      - "Lymph Node"
      - "Gallbladder"
      - "Jejunum"
      - "Ovary"
      - "Perigastric Nodule"
    missing_values:
      - "NA"
      - ""
      - "nan"
    interpretation_warning: >
      `tissue` is the anatomical site the sample was taken from, NOT a curated
      liver-vs-lung metastatic-tropism class. Most sites are small (Lung n=7,
      Peritoneum n=15, many singletons). Data-hygiene caveats: 'Lymph Node' and
      'LymphNode' appear as separate strings (same site — normalise before
      grouping), and one sample is 'NA'. Compute group sizes from the loaded
      data and exclude groups with fewer than ~3 samples from DE.
    reporting_rules:
      - "Report tissue-site group sizes as computed from the loaded data."
      - "Normalise 'LymphNode' and 'Lymph Node' to one category before counting."
    refusal_rules:
      - "Refuse DE on tissue groups with fewer than 3 samples."
      - "Refuse to treat `tissue` as the study's liver/lung metastatic-avidity signature label."

  cell_type:
    role: technical_metadata
    biological_grouping_allowed: false
    allowed_values:
      - "scraped tumor"
    source_column: "cell type"
    interpretation_warning: >
      Constant across all 289 samples ('scraped tumor'). Carries no variation
      and is not a grouping variable.
    refusal_rules:
      - "Refuse to use cell_type as a grouping variable — it is constant."

# ---------------------------------------------------------------------------
# Dataset-level reporting and refusal rules
# ---------------------------------------------------------------------------

reporting_rules:
  - "Report dataset size as computed from the loaded data."
  - >
    State that expression values are tximport ESTIMATED counts rounded to int32
    (kallisto + tximport, GENCODE v24), and that DESeq2 is used because this is
    the count-level variant of the dataset.
  - >
    When asked about liver-vs-lung recurrence or the study's metastatic-avidity
    signature, state plainly that those tropism labels are NOT in the GEO
    metadata (clinical chart review; raw data dbGaP phs003597) and cannot be
    reconstructed from the deposited `tissue`/`tumor type` fields.
  - "State any subset query used in reported results."

refusal_rules:
  - "Refuse limma or ttest on this variant — data_level is raw_counts; DESeq2 required. Use gse205154_sears (TPM) or gse205154_sears_tmm for Path B."
  - "Refuse to pool this variant with gse205154_sears or gse205154_sears_tmm — they are the same samples in different units."
  - "Refuse survival analysis — survival/outcome endpoints are not provided in this GEO subseries (see dbGaP phs003597)."
  - "Refuse to construct or claim a liver-vs-lung metastatic-tropism grouping from GEO metadata — those labels are not deposited."

# ---------------------------------------------------------------------------
# Analysis configuration (semantics only — no sample counts)
# ---------------------------------------------------------------------------

group_columns:
  - "tumor_type"
  - "tissue"

feature_mapping:
  requires_collapse: false
  # Ensembl gene IDs in var.index; HGNC symbols in var['SYMBOL'] (from the
  # matrix hgnc_symbol column). Feature-level IDs — no probe collapse needed.

survival_columns:
  event_column: null
  time_column: null
  note: >
    No survival endpoints in this GEO subseries. The publication's outcome
    analyses used clinical data held in dbGaP phs003597, not deposited here.

default_contrasts:
  - design_factor: "tumor_type"
    test_group: "Met"
    control_group: "Primary"
    subset_query: "tumor_type in ['Primary', 'Met']"
    method: deseq2
    note: >
      Primary (218) vs metastatic (71). DESeq2 on int32 estimated counts.
      Met pools multiple anatomical sites — interpret accordingly.

valid_workflows:
  - activity_scoring
  - activity_stats

limitations:
  - "GSE205154 is the bulk RNA-seq subseries of SuperSeries GSE281129; the
    companion TCRbeta-seq subseries (GSE281005) is not represented here."
  - "Values are kallisto/tximport ESTIMATED counts, which are non-integer. They
    are rounded to int32 at assembly for DESeq2. This is an approximation: the
    statistically recommended path is tximport→DESeqDataSetFromTximport with an
    average-transcript-length offset, which naive rounding discards. For
    length-aware DE, work from the raw GEO file rather than the rounded h5ad."
  - "The liver-vs-lung metastatic-tropism / avidity grouping that defines the
    study's gene signature is NOT in the GEO metadata — it came from clinical
    chart review and is not deposited with the expression matrix. Do not infer
    it from `tissue` or `tumor type`."
  - "No survival or clinical-outcome fields are deposited in this subseries
    (raw + clinical data in dbGaP phs003597.v1.p1). Survival workflow disabled."
  - "FFPE-derived RNA — expect higher degradation/3' bias than fresh-frozen;
    interpret low-expression genes cautiously."
  - "Metastatic samples (n=71) span several anatomical sites; many sites are
    singletons. Most `tissue` groups are too small for DE on their own."
  - "Same 289 samples as gse205154_sears (TPM) and gse205154_sears_tmm (TMM).
    Choose ONE variant per analysis; never pool them."
  - "PLACEHOLDER expression_source: the pre-assembled h5ad at
    anne-voigt/pdac-research-data/gse205154_sears_counts.h5ad has not been built
    or uploaded yet; the URL will 404 until it is. Assemble from the GEO counts
    supplementary file (original_source)."
  - "7 of the 289 samples carry an -F (fibroblast) name suffix yet are annotated
    `cell type: scraped tumor` and `tumor type: Primary` in GEO. Treat these as
    possibly non-epithelial/fibroblast and exclude or inspect them before
    tumor-specific analyses; do not assume all 289 columns are tumor epithelium."
