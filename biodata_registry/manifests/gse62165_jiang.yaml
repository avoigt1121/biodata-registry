# Jiang et al. — GSE62165
# PDAC bulk microarray — molecular subtypes and master regulators
#
# Reference: Jiang W et al. (2015)
#            https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE62165
#
# VALIDATED: column names and values confirmed from GEO header inspection (June 2026).
# Golden counts: pancreatic tumor=118, non-tumoral=13, total=131

dataset_id: gse62165_jiang

title: "Jiang et al. PDAC Molecular Subtypes Bulk Microarray (GSE62165)"

accession: GSE62165

organism: human

modality: bulk_microarray

platform: "Affymetrix Human Genome U219 Array (GPL13667)"

data_level: log_expression
# Affymetrix RMA-normalised log2 expression values.
# Do NOT apply DESeq2 or decoupler_preprocess_data.

feature_id_type: probe_id
# var.index contains Affymetrix probe IDs — must be collapsed to gene symbols
# using decoupler_annotate_probes_with_gpl(gpl_accession_or_url="GPL13667") then
# decoupler_collapse_probes_to_genes before running enrichment tools.

description: >
  Pancreatic ductal adenocarcinoma (PDAC) bulk microarray from Jiang et al. 2015.
  131 samples: 118 PDAC whole-tumor tissue and 13 non-tumoral pancreatic controls.
  Largest of the four PDAC cohorts. Contains staging information (Stage, grouped stage).

publication:
  doi: ""
  authors: "Jiang W et al."
  year: 2015
  journal: ""
  title: >
    Prognostic relevance of molecular subtypes and master regulators
    in pancreatic ductal adenocarcinoma

expression_source:
  type: geo_series_matrix
  url: "https://ftp.ncbi.nlm.nih.gov/geo/series/GSE62nnn/GSE62165/matrix/GSE62165_series_matrix.txt.gz"
  format: gz

metadata_source:
  type: geo_series_matrix
  embedded: true
  note: >
    Confirmed columns from GEO header:
      tissue: "pancreatic tumor" (118) | "non-tumoral pancreatic tissue" (13)
      stage: "2b" (62) | "2a" (30) | "4" (13) | "1b" (7) | "3" (5) | "1a" (1) | "NA" (13)
      grouped_stage: "LNM" (62) | "Early" (38) | "Advanced" (18) | "NA" (13)

sample_id_column: null

metadata_columns:

  tissue:
    role: primary_condition
    biological_grouping_allowed: true
    allowed_values:
      - "pancreatic tumor"
      - "non-tumoral pancreatic tissue"
    missing_values:
      - ""
      - "NA"
      - "nan"
    empty_value_meaning: >
      No tissue type annotation. Do not infer tissue category from missing value.
    interpretation_warning: >
      Highly imbalanced design: 118 PDAC vs 13 normal controls. Statistical
      comparisons are valid but power for normal-specific signals is limited.
    reporting_rules:
      - "Report counts computed from loaded data, not from this manifest."
      - "Note the imbalanced design (118 PDAC vs 13 normal) in result summaries."
      - "State any subset query applied."
    refusal_rules:
      - "Refuse DESeq2 — data_level is log_expression, not raw_counts."

  stage:
    role: covariate
    biological_grouping_allowed: true
    allowed_values:
      - "1a"
      - "1b"
      - "2a"
      - "2b"
      - "3"
      - "4"
      - "NA"
    description: "AJCC tumor stage. NA for normal tissue controls."

  grouped_stage:
    role: covariate
    biological_grouping_allowed: true
    allowed_values:
      - "Early"
      - "LNM"
      - "Advanced"
      - "NA"
    description: "Grouped staging: Early (stage 1-2a), LNM (lymph node metastasis, 2b), Advanced (3-4). NA for normal tissue controls."

reporting_rules:
  - "Clarify that expression values are RMA-normalised log2 intensities."
  - "Note that probe collapse to gene symbols (GPL13667) is required before enrichment analysis."
  - "Note imbalanced design (118 PDAC vs 13 normal) in all result summaries."
  - "State any subset query used."

refusal_rules:
  - "Refuse DESeq2 — data_level is log_expression, not raw_counts."
  - "Refuse enrichment analysis before probe collapse step is confirmed."
  - "Refuse survival analysis — no survival endpoints in this GEO submission."

group_columns:
  - "tissue"
  - "grouped_stage"

feature_mapping:
  requires_collapse: true
  gene_symbol_column: "Gene Symbol"
  collapse_method: mean
  multi_gene_policy: drop

survival_columns:
  event_column: null
  time_column: null

default_contrasts:
  - design_factor: "tissue"
    test_group: "pancreatic tumor"
    control_group: "non-tumoral pancreatic tissue"
    subset_query: null
    method: limma
    fallback_method: ttest

valid_workflows:
  - microarray
  - activity_scoring
  - activity_stats

limitations:
  - "Probe collapse to gene symbols (GPL13667) required before enrichment analysis."
  - "Imbalanced design: 118 PDAC vs 13 normal controls."
  - "No confirmed survival endpoints in GEO submission."
